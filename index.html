<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR寸法システム</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="ui">
  タップで穴追加🔥<br>
  距離自動表示📏
</div>

<a-scene cursor="rayOrigin: mouse">

  <!-- カメラ -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- ライト -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- 床 -->
  <a-plane
    id="ground"
    position="0 0 -5"
    rotation="-90 0 0"
    width="20"
    height="20"
    color="#444">
  </a-plane>

</a-scene>

<script>

const scene = document.querySelector("a-scene");
const ground = document.querySelector("#ground");

let holes = [];

ground.addEventListener("click", (e) => {

  const point = e.detail.intersection.point;

  // 穴作成
  const hole = document.createElement("a-cylinder");

  hole.setAttribute("position", {
    x: point.x,
    y: 0.05,
    z: point.z
  });

  hole.setAttribute("radius", 0.08);
  hole.setAttribute("height", 0.02);
  hole.setAttribute("color", "red");

  scene.appendChild(hole);

  holes.push({
    x: point.x,
    z: point.z
  });

  // 2個以上なら距離計算
  if (holes.length >= 2) {

    const a = holes[holes.length - 2];
    const b = holes[holes.length - 1];

    const dx = b.x - a.x;
    const dz = b.z - a.z;

    const distance = Math.sqrt(dx * dx + dz * dz);

    // mm換算
    const mm = (distance * 1000).toFixed(0);

    // 中間位置
    const midX = (a.x + b.x) / 2;
    const midZ = (a.z + b.z) / 2;

    // 距離テキスト
    const text = document.createElement("a-text");

    text.setAttribute("value", `${mm} mm`);

    text.setAttribute("position", {
      x: midX,
      y: 0.3,
      z: midZ
    });

    text.setAttribute("align", "center");
    text.setAttribute("color", "yellow");
    text.setAttribute("scale", "1 1 1");

    scene.appendChild(text);

    // 線
    const line = document.createElement("a-entity");

    line.setAttribute("line", {
      start: `${a.x} 0.05 ${a.z}`,
      end: `${b.x} 0.05 ${b.z}`,
      color: "yellow"
    });

    scene.appendChild(line);

  }

});

</script>

</body>
</html>
