<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR穴位置システム</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="ui">
  タップで穴追加🔥
</div>

<a-scene cursor="rayOrigin: mouse">

  <!-- カメラ -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- ライト -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- 床 -->
  <a-plane
    id="ground"
    position="0 0 -5"
    rotation="-90 0 0"
    width="20"
    height="20"
    color="#444">
  </a-plane>

</a-scene>

<script>
const scene = document.querySelector("a-scene");
const ground = document.querySelector("#ground");

ground.addEventListener("click", (e) => {

  const point = e.detail.intersection.point;

  // 穴
  const hole = document.createElement("a-cylinder");

  hole.setAttribute("position", {
    x: point.x,
    y: 0.05,
    z: point.z
  });

  hole.setAttribute("radius", 0.08);
  hole.setAttribute("height", 0.02);
  hole.setAttribute("color", "red");

  scene.appendChild(hole);

  // 寸法テキスト
  const text = document.createElement("a-text");

  text.setAttribute("value",
    `${(point.x * 100).toFixed(0)} mm`
  );

  text.setAttribute("position", {
    x: point.x,
    y: 0.3,
    z: point.z
  });

  text.setAttribute("align", "center");
  text.setAttribute("color", "yellow");
  text.setAttribute("scale", "1 1 1");

  scene.appendChild(text);

});
</script>

</body>
</html>
