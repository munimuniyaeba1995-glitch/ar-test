<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AR穴位置ガイド</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
}
</style>
</head>

<body>

<a-scene embedded arjs>

  <!-- カメラ -->
  <a-marker preset="hiro">

    <!-- 穴位置 -->
    <a-cylinder
      position="0 0.1 0"
      radius="0.03"
      height="0.01"
      color="red">
    </a-cylinder>

    <!-- 寸法線 -->
    <a-box
      position="0.15 0.01 0"
      width="0.3"
      height="0.005"
      depth="0.005"
      color="yellow">
    </a-box>

    <!-- テキスト -->
    <a-text
      value="150mm"
      position="0.15 0.08 0"
      scale="0.5 0.5 0.5"
      color="white">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
