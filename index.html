<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AR CAD SYSTEM FIX</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;

  background:rgba(0,0,0,0.7);
  color:white;

  padding:10px;
  border-radius:10px;

  width:220px;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff4444;
  color:white;
}

#debug{
  margin-top:10px;
  font-size:12px;
  max-height:120px;
  overflow:auto;
}

</style>
</head>

<body>

<div id="ui">

🔥 AR CAD SYSTEM

<button id="clearBtn">
リセット
</button>

<div id="debug">
READY
</div>

</div>

<a-scene>

  <!-- カメラ -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- ライト -->
  <a-light
    type="ambient"
    intensity="1">
  </a-light>

  <!-- 床 -->
  <a-plane
    id="ground"
    position="0 0 -5"
    rotation="-90 0 0"
    width="20"
    height="20"
    color="#333">
  </a-plane>

</a-scene>

<script>

const scene =
document.querySelector("a-scene");

const ground =
document.querySelector("#ground");

const debug =
document.querySelector("#debug");

const clearBtn =
document.querySelector("#clearBtn");

let holes =
JSON.parse(
localStorage.getItem("holes")
)||[];

// =====================
// DEBUG
// =====================

function setDebug(text){

  debug.innerHTML = text;

}

// =====================
// GRID
// =====================

for(let i=-10;i<=10;i++){

  const lineX =
  document.createElement("a-entity");

  lineX.setAttribute("line",{

    start:`${i} 0 -10`,
    end:`${i} 0 10`,
    color:"#555"

  });

  scene.appendChild(lineX);

  const lineZ =
  document.createElement("a-entity");

  lineZ.setAttribute("line",{

    start:`-10 0 ${i}`,
    end:`10 0 ${i}`,
    color:"#555"

  });

  scene.appendChild(lineZ);

}

// =====================
// RESTORE
// =====================

holes.forEach(h=>{

  createHole(h.x,h.z);

});

setDebug(
`保存穴数: ${holes.length}`
);

// =====================
// iPhone TAP FIX
// =====================

scene.addEventListener(
"click",(e)=>{

  const touch =
  e.detail.intersection;

  if(!touch) return;

  if(
    touch.object.el.id
    !== "ground"
  ) return;

  const point = touch.point;

  // SNAP
  const snap = 0.5;

  const x =
  Math.round(point.x/snap)
  *snap;

  const z =
  Math.round(point.z/snap)
  *snap;

  holes.push({x,z});

  localStorage.setItem(
    "holes",
    JSON.stringify(holes)
  );

  createHole(x,z);

  setDebug(`
  X:${x}<br>
  Z:${z}<br>
  穴数:${holes.length}
  `);

});

// =====================
// CREATE
// =====================

function createHole(x,z){

  // HOLE
  const hole =
  document.createElement(
    "a-cylinder"
  );

  hole.setAttribute(
    "position",{

    x:x,
    y:0.05,
    z:z

  });

  hole.setAttribute(
    "radius",0.1);

  hole.setAttribute(
    "height",0.02);

  hole.setAttribute(
    "color","red");

  scene.appendChild(hole);

  // TEXT
  const text =
  document.createElement(
    "a-text"
  );

  text.setAttribute(
    "value",
    `${x}, ${z}`
  );

  text.setAttribute(
    "position",{

    x:x,
    y:0.3,
    z:z

  });

  text.setAttribute(
    "align","center"
  );

  text.setAttribute(
    "color","yellow"
  );

  text.setAttribute(
    "scale","0.8 0.8 0.8"
  );

  scene.appendChild(text);

}

// =====================
// CLEAR
// =====================

clearBtn.addEventListener(
"click",()=>{

  localStorage.removeItem(
    "holes"
  );

  location.reload();

});

</script>

</body>
</html>
